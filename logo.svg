<svg viewBox="0 0 362 418" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="hc">
      <polygon points="181,8 352,106 352,312 181,410 10,312 10,106"/>
    </clipPath>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#162d58"/>
      <stop offset="100%" stop-color="#080f20"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <polygon points="181,8 352,106 352,312 181,410 10,312 10,106" fill="url(#bg)" clip-path="url(#hc)"/>

  <!-- Subtle horizontal scan lines for depth -->
  <line x1="10" y1="106" x2="352" y2="106" stroke="#1e3f70" stroke-width="0.4" opacity="0.3" clip-path="url(#hc)"/>
  <line x1="10" y1="209" x2="352" y2="209" stroke="#1e3f70" stroke-width="0.4" opacity="0.15" clip-path="url(#hc)"/>
  <line x1="10" y1="312" x2="352" y2="312" stroke="#1e3f70" stroke-width="0.4" opacity="0.3" clip-path="url(#hc)"/>

  <!-- Null reference line -->
  <line x1="181" y1="88" x2="181" y2="248" stroke="#4A9ED6" stroke-width="0.7" opacity="0.2"/>

  <!-- Row 1 — widest, most faded -->
  <line x1="92" y1="118" x2="272" y2="118" stroke="#4A9ED6" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
  <circle cx="156" cy="118" r="4.5" fill="#4A9ED6" opacity="0.22"/>

  <!-- Row 2 -->
  <line x1="112" y1="153" x2="258" y2="153" stroke="#4A9ED6" stroke-width="3.5" stroke-linecap="round" opacity="0.42"/>
  <circle cx="160" cy="153" r="5.5" fill="#4A9ED6" opacity="0.48"/>

  <!-- Row 3 — FEATURED -->
  <line x1="136" y1="191" x2="224" y2="191" stroke="#5BB8F5" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="136" y1="183" x2="136" y2="199" stroke="#5BB8F5" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <line x1="224" y1="183" x2="224" y2="199" stroke="#5BB8F5" stroke-width="3" stroke-linecap="round" filter="url(#softglow)"/>
  <polygon points="155,191 163,183 171,191 163,199" fill="#89D4FF" filter="url(#glow)"/>

  <!-- Row 4 -->
  <line x1="105" y1="228" x2="260" y2="228" stroke="#4A9ED6" stroke-width="3.5" stroke-linecap="round" opacity="0.38"/>
  <circle cx="158" cy="228" r="5" fill="#4A9ED6" opacity="0.42"/>

  <!-- Row 5 — widest, most faded -->
  <line x1="88" y1="261" x2="276" y2="261" stroke="#4A9ED6" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
  <circle cx="154" cy="261" r="4.5" fill="#4A9ED6" opacity="0.18"/>

  <!-- Rule above name -->
  <line x1="90" y1="285" x2="272" y2="285" stroke="#4A9ED6" stroke-width="0.6" opacity="0.2"/>

  <!-- Package name -->
  <text
    x="181" y="318"
    font-family="'Helvetica Neue','Arial',sans-serif"
    font-size="26"
    font-weight="300"
    letter-spacing="1"
    text-anchor="middle"
  ><tspan fill="#6DAEDC">gg</tspan><tspan fill="#EEF4FF">adjustedforest</tspan></text>

  <!-- Hex border -->
  <polygon points="181,8 352,106 352,312 181,410 10,312 10,106" fill="none" stroke="#4A9ED6" stroke-width="5.5" opacity="0.45"/>
  <polygon points="181,14 346,109 346,309 181,404 16,309 16,109" fill="none" stroke="#89D4FF" stroke-width="0.8" opacity="0.1"/>
</svg>
